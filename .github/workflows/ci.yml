name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the `prisma generate` postinstall, which produces the
      # Prisma client types the app imports. No database is required for that.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      # A production build is the strongest single gate: it typechecks and
      # compiles every route. DATABASE_URL is a dummy — the build does not
      # connect, but Prisma's config reads the variable.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          SESSION_SECRET: ci-build-only-not-a-real-secret
